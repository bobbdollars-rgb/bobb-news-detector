name: Bobb Market Intelligence v1.8

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-detector:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore news state cache
        uses: actions/cache@v4
        with:
          path: bobb_news_state.json
          key: news-state-${{ github.run_id }}
          restore-keys: |
            news-state-

      - name: Run News Detector
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python bobb_news_detector.py

      - name: Save news state cache
        if: always()
        uses: actions/cache@v4
        with:
          path: bobb_news_state.json
          key: news-state-${{ github.run_id }}
