name: Bobb Market Intelligence v2.4

on:
  schedule:
    # Tiap 15 menit — balance antara responsiveness & free tier quota
    # GitHub Actions free tier: 2000 menit/bulan
    # 15 menit → 2880 run/bulan × ~1 menit eksekusi = ~2880 menit → aman di free tier
    # Window reminder (15-45m) & actual (5-45m) sudah di-design untuk toleransi 15 menit
    - cron: '*/15 * * * *'

  # Manual trigger — buat testing
  workflow_dispatch:

jobs:
  run-detector:
    runs-on: ubuntu-latest
    # v2.4: naik dari 6→8 menit. v2.4 ada 13 modes — lebih banyak network call.
    # Worst-case semua network call timeout (FF-JSON/HTML/MyFxBook + RSS feeds
    # + 11 pair price check + Telegram sends) bisa mendekati 6 menit kalau
    # koneksi lemot — kasih margin biar gak ke-kill di tengah jalan
    # (state belum ke-save = dedup utk run itu hilang).
    timeout-minutes: 8

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore state cache — ambil cache terbaru via restore-keys prefix match
      # v2.1 FIX — bug kritis: key sebelumnya statis ("news-state-latest").
      # actions/cache TIDAK bisa overwrite cache dengan key yang sama persis.
      # Akibatnya: run pertama berhasil save, tapi SEMUA run berikutnya gagal
      # save secara diam-diam ("Cache already exists" warning, job tetap hijau).
      # Dedup/cooldown state jadi beku di kondisi run #1 selamanya → reminder,
      # actual result, breaking news, & spike alert bisa terkirim ULANG tiap
      # run dalam window waktu yang sama, karena state-nya gak pernah ke-update.
      #
      # FIX: key UNIK per run (pakai github.run_id) khusus untuk SAVE, dan
      # restore-keys dengan prefix untuk ambil cache TERBARU saat restore.
      # Cache lama otomatis di-garbage-collect GitHub kalau gak diakses 7 hari,
      # jadi gak perlu cleanup manual.
      - name: Restore news state cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: bobb_news_state.json
          key: news-state-${{ github.run_id }}
          restore-keys: |
            news-state-

      - name: Run News Detector
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python bobb_news_detector.py

      # Save state setelah run — key unik per run_id supaya SELALU berhasil
      # ke-save (gak pernah collide sama cache run sebelumnya)
      - name: Save news state cache
        if: always()   # Simpan meskipun ada error
        uses: actions/cache/save@v4
        with:
          path: bobb_news_state.json
          key: news-state-${{ github.run_id }}
